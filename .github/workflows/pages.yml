name: Deploy Next.js site to Pages

on:
  push:
    branches: ["stable"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            compiler/package-lock.json
            site/package-lock.json

      - name: Install compiler dependencies
        run: npm ci
        working-directory: compiler

      - name: Compile templates
        run: node ./compiler/index.mjs --no-fetch

      - name: Create site public gists directory
        run: mkdir -p site/public/gists

      - name: Move compiled profiles to site
        run: |
          rm -rf site/public/gists/*
          cp compiled/*.code-profile site/public/gists/ 2>/dev/null || true
          cp compiled/manifest.json site/public/gists/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            site/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build with Next.js
        run: npm run build
        working-directory: site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
