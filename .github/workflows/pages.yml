name: Compile and Build Site

on:
  push:
    branches: ["stable"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "build"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            compiler/package-lock.json
            site/package-lock.json

      - name: Install compiler dependencies
        run: npm ci
        working-directory: compiler

      - name: Compile templates
        run: node ./compiler/index.mjs

      - name: Create site public fragments directory
        run: mkdir -p site/public/fragments

      - name: Move compiled profiles to site
        run: |
          rm -rf site/public/fragments/*
          cp compiled/*.code-profile site/public/fragments/ 2>/dev/null || true
          cp compiled/manifest.json site/public/fragments/ 2>/dev/null || true

      - name: Build with Next.js
        run: npm run build
        working-directory: site
